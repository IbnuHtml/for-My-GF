<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maafin Aku</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(135deg, #ffc0cb, #ff69b4);
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #fff;
      margin-top: 15vh;
      text-shadow: 2px 2px #ff1493;
      font-size: 6vw;
      animation: pulse 2s infinite;
    }
    p {
      font-size: 4.5vw;
      color: #fff;
      margin: 20px auto;
      max-width: 90%;
      animation: fadeIn 3s ease-in-out infinite alternate;
    }
    button {
      margin: 15px;
      padding: 12px 25px;
      font-size: 4vw;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      animation: bounce 2s infinite;
    }
    .yes { background-color: #ffb6c1; }
    .no { background-color: #add8e6; }
    .music { background-color: #ffe4b5; }
    button:hover { transform: scale(1.1); }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 12vw;
      color: #fff;
      text-align: center;
      opacity: 0;
      animation: pop 1.5s forwards;
    }
    .popup span {
      display: block;
      font-size: 5vw;
      margin-top: 10px;
      animation: fadeText 2s forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
    @keyframes fadeText {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <h1>Sayang, maafin aku ya 💖</h1>
  <p>Aku janji akan memperbaiki kesalahanku, aku salah karena kurang memuji kecantikan kamu. Aku emang excited tapi aku ga menunjukkan nya dengan chat langsung 🍓</p>
  
  <button class="yes" onclick="forgive(true)">Iya</button>
  <button class="no" onclick="forgive(false)">Tidak</button>
  <br>
  <button class="music" onclick="toggleMusic()">▶️ Play/Pause Musik</button>

  <!-- Musik autoplay -->
  <audio id="bgMusic" loop>
    <source src="harvey.mp3" type="audio/mpeg">
    Browser kamu tidak mendukung audio.
  </audio>

  <script>
    const music = document.getElementById("bgMusic");

    // Set mulai dari menit 1 (60 detik)
    music.addEventListener("loadedmetadata", () => {
      music.currentTime = 60;
      music.play().catch(() => {
        console.log("Autoplay diblokir, musik akan jalan setelah klik tombol.");
      });
    });

    function forgive(isYes) {
      showPopup(isYes);
      music.play(); // pastikan musik jalan setelah interaksi
    }

    function showPopup(isYes) {
      const flowers = ["🌸","🌹","🌻","💐","🌷"];
      const flower = document.createElement("div");
      flower.className = "popup";

      if (isYes) {
        flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)] +
          "<span>Yeay! Kamu memaafkan aku 😍💐</span>";
      } else {
        flower.innerHTML = "😢<span>Harus maafin dong sayang</span>";
      }

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 2000);
    }

    // Tombol Play/Pause musik
    function toggleMusic() {
      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }
  </script>
</body>
</html>
