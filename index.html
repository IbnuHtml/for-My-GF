<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maafin Aku</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(135deg, #ffc0cb, #ff69b4);
      overflow: hidden;
    }
    h1 {
      color: #fff;
      margin-top: 50px;
      text-shadow: 2px 2px #ff1493;
      animation: pulse 2s infinite;
    }
    p {
      font-size: 20px;
      color: #fff;
      animation: fadeIn 3s ease-in-out infinite alternate;
    }
    button {
      margin: 20px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      animation: bounce 2s infinite;
    }
    .yes {
      background-color: #ffb6c1;
    }
    .no {
      background-color: #add8e6;
    }
    button:hover {
      transform: scale(1.2) rotate(-5deg);
    }
    .flower {
      position: absolute;
      font-size: 30px;
      animation: float 5s linear forwards;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      50% { transform: translateY(-150px) rotate(180deg); opacity: 0.8; }
      100% { transform: translateY(-300px) rotate(360deg); opacity: 0; }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <h1>Sayang, maafin aku ya 💖</h1>
  <p>Aku Salah Harusnya ak Puji Kamu Dengan Lebih mengekspos Kecantikanmu Yang Sangat Gorgeus itu 🍓</p>
  <button class="yes" onclick="forgive()">Iya</button>
  <button class="no" onclick="forgive()">Tidak</button>

  <script>
    function forgive() {
      alert("Yeay! Kamu memaafkan aku 😍💐");
      for (let i = 0; i < 20; i++) {
        createFlower();
      }
    }

    function createFlower() {
      const flower = document.createElement("div");
      flower.className = "flower";
      const flowers = ["🌸","🌹","🌻","💐","🌷"];
      flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * window.innerWidth + "px";
      flower.style.top = (window.innerHeight - 50) + "px";
      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 5000);
    }
  </script>
</body>
</html>
