<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- penting untuk HP -->
  <title>Maafin Aku</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(135deg, #ffc0cb, #ff69b4);
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #fff;
      margin-top: 20vh; /* biar turun ke tengah layar */
      text-shadow: 2px 2px #ff1493;
      font-size: 6vw; /* ukuran fleksibel sesuai lebar layar */
      animation: pulse 2s infinite;
    }
    p {
      font-size: 4.5vw;
      color: #fff;
      margin: 20px auto;
      max-width: 90%;
      animation: fadeIn 3s ease-in-out infinite alternate;
    }
    button {
      margin: 15px;
      padding: 12px 25px;
      font-size: 4vw;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      animation: bounce 2s infinite;
    }
    .yes { background-color: #ffb6c1; }
    .no { background-color: #add8e6; }
    button:hover { transform: scale(1.1); }

    /* Pop-up bunga + teks */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 12vw; /* besar di HP */
      color: #fff;
      text-align: center;
      opacity: 0;
      animation: pop 1.5s forwards;
    }
    .popup span {
      display: block;
      font-size: 5vw;
      margin-top: 10px;
      animation: fadeText 2s forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
    @keyframes fadeText {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <h1>Sayang, maafin aku ya 💖</h1>
  <p> Aku janji akan memperbaiki kesalahanku,aku salah karena kurang memuji keacantikan kamu ak emang exxcited tapi ak ga menunjukkan nya dengan chat langsung 🍓</p>
  <button class="yes" onclick="forgive()">Iya</button>
  <button class="no" onclick="forgive()">Tidak</button>

  <script>
    function forgive() {
      showPopup();
    }

    function showPopup() {
      const flowers = ["🌸","🌹","🌻","💐","🌷"];
      const flower = document.createElement("div");
      flower.className = "popup";
      flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)] +
        "<span>Yeay! Kamu memaafkan aku 😍💐</span>";
      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 2000);
    }
  </script>
</body>
</html>
