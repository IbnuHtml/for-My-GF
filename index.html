<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maafin Aku</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(135deg, #ffc0cb, #ff69b4);
      overflow: hidden;
    }
    h1 {
      color: #fff;
      margin-top: 50px;
      text-shadow: 2px 2px #ff1493;
      animation: pulse 2s infinite;
    }
    p {
      font-size: 20px;
      color: #fff;
      animation: fadeIn 3s ease-in-out infinite alternate;
    }
    button {
      margin: 20px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      animation: bounce 2s infinite;
    }
    .yes { background-color: #ffb6c1; }
    .no { background-color: #add8e6; }
    button:hover { transform: scale(1.2) rotate(-5deg); }

    /* Pop-up bunga + teks */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 60px;
      color: #fff;
      text-align: center;
      opacity: 0;
      animation: pop 1.5s forwards;
    }
    .popup span {
      display: block;
      font-size: 28px;
      margin-top: 15px;
      animation: fadeText 2s forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
    @keyframes fadeText {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <h1>Sayang, maafkan aku ya 💖</h1>
  <p>Aku Salah Harusnya ak Puji Kamu Dengan Lebih mengekspos Kecantikanmu Yang Sangat Gorgeus itu 🍓</p>
  <button class="yes" onclick="forgive()">Iya</button>
  <button class="no" onclick="forgive()">Tidak</button>

  <script>
    function forgive() {
      showPopup();
    }

    function showPopup() {
      const flowers = ["🌸","🌹","🌻","💐","🌷"];
      const flower = document.createElement("div");
      flower.className = "popup";
      flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)] +
        "<span>Yeay! Kamu memaafkan aku 😍💐</span>";
      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 2000); // hilang setelah 2 detik
    }
  </script>
</body>
</html>
